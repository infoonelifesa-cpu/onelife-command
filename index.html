<!DOCTYPE html>

<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { background:#0d1117; color:#fff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; padding:16px; }
.header { text-align:center; padding:20px 0; }
.header h1 { color:#00ff88; font-size:1.5em; }
.header p { color:#888; font-size:0.85em; }
.section { background:#16213e; border-radius:10px; padding:16px; margin:12px 0; }
.section-title { color:#00ff88; font-size:0.9em; font-weight:bold; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; }
.metrics { display:grid; grid-template-columns:repeat(4,1fr); gap:8px; margin:12px 0; }
.metric { background:#16213e; border-radius:8px; padding:12px; text-align:center; }
.metric-value { font-size:1.2em; font-weight:bold; color:#00ff88; }
.metric-label { font-size:0.7em; color:#888; margin-top:4px; }
#agents-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:8px; }
</style>
</head>
<body>
<div class="header">
    <h1>⚡ Onelife Command Center</h1>
    <p>Operations Intelligence Dashboard</p>
    <p id="conn-status" style="margin-top:8px;font-size:0.8em">Connecting...</p>
</div>

<div class="metrics">
    <div class="metric"><div class="metric-value" id="metric-revenue">-</div><div class="metric-label">MONTHLY REVENUE</div></div>
    <div class="metric"><div class="metric-value" id="metric-stores">-</div><div class="metric-label">STORES</div></div>
    <div class="metric"><div class="metric-value" id="metric-products">-</div><div class="metric-label">PRODUCTS</div></div>
    <div class="metric"><div class="metric-value" id="metric-brands">-</div><div class="metric-label">BRANDS</div></div>
</div>

<div class="section">
    <div class="section-title"><span>🤖 Agent Status</span><span id="agents-count" style="color:#888;font-size:0.85em">0 active</span></div>
    <div id="agents-grid"></div>
</div>

<div class="section">
    <div class="section-title"><span>📋 Active Tasks</span><span id="tasks-count" style="color:#888;font-size:0.85em">0 tasks</span></div>
    <div id="tasks-list"></div>
</div>

<div class="section">
    <div class="section-title"><span>🧪 MiroFish Simulations</span></div>
    <div id="sims-list"></div>
</div>

<div class="section">
    <div class="section-title"><span>📊 SEO Scorecard</span></div>
    <div id="seo-metrics"></div>
</div>

<div class="section">
    <div class="section-title"><span>📡 Recent Activity</span></div>
    <div id="activity-log" style="max-height:200px;overflow-y:auto"></div>
</div>

// Try API first, fall back to embedded data
let currentData = EMBEDDED_STATUS;
let isLive = false;

async function fetchStatus() {
    try {
        // Try local network API (only works on same WiFi without HTTPS issue)
        const controller = new AbortController();
        setTimeout(() => controller.abort(), 3000);
        const res = await fetch('http://192.168.68.58:5050/api/status', { signal: controller.signal });
        if (res.ok) {
            currentData = await res.json();
            isLive = true;
        }
    } catch(e) {
        // Use embedded data (still useful, just not live)
        isLive = false;
    }
    renderDashboard(currentData, isLive);
}

function renderDashboard(data, live) {
    // Update status indicator
    const statusEl = document.getElementById('conn-status');
    if (statusEl) {
        statusEl.innerHTML = live ? 
            '<span style="color:#00ff88">● Live</span>' : 
            '<span style="color:#ffd700">● Cached (' + (data.last_updated || 'embedded') + ')</span>';
    }
    
    // Agents
    const agentsEl = document.getElementById('agents-grid');
    const activeCount = (data.agents || []).filter(a => a.status === 'active').length;
    document.getElementById('agents-count').textContent = activeCount + ' active';
    if (agentsEl) {
        agentsEl.innerHTML = (data.agents || []).map(a => `
            <div style="background:#1a1a2e;border-radius:8px;padding:12px;border-left:3px solid ${a.status==='active'?'#00ff88':a.status==='watching'?'#ffd700':'#555'}">
                <div style="font-weight:bold;color:#fff">${a.name}</div>
                <div style="font-size:0.8em;color:#aaa">${a.role}</div>
                <div style="font-size:0.75em;color:#888">${a.model}</div>
                <div style="font-size:0.8em;color:${a.status==='active'?'#00ff88':a.status==='watching'?'#ffd700':'#555'};margin-top:4px">${a.status}</div>
                ${a.current_task ? '<div style="font-size:0.75em;color:#aaa;margin-top:4px">'+a.current_task+'</div>' : ''}
            </div>
        `).join('');
    }
    
    // Tasks
    const tasksEl = document.getElementById('tasks-list');
    document.getElementById('tasks-count').textContent = (data.tasks || []).length + ' tasks';
    if (tasksEl) {
        tasksEl.innerHTML = (data.tasks || []).map(t => `
            <div style="background:#1a1a2e;border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid ${t.status==='in_progress'?'#00ff88':t.status==='completed'?'#4488ff':'#ffd700'}">
                <div style="color:#fff;font-size:0.9em">${t.name}</div>
                <div style="color:#888;font-size:0.75em">${t.agent} · ${t.status}</div>
            </div>
        `).join('');
    }
    
    // Simulations
    const simsEl = document.getElementById('sims-list');
    if (simsEl) {
        simsEl.innerHTML = (data.simulations || []).map(s => `
            <div style="background:#1a1a2e;border-radius:6px;padding:10px;margin-bottom:6px;border-left:3px solid ${s.status==='completed'?'#00ff88':'#ffd700'}">
                <div style="color:#fff;font-size:0.9em">${s.name}</div>
                <div style="color:#888;font-size:0.75em">${s.model} · ${s.actions} actions</div>
                <div style="color:#00ff88;font-size:0.8em;margin-top:4px">${s.verdict}</div>
            </div>
        `).join('');
    }
    
    // SEO
    const seo = data.seo || {};
    const seoEl = document.getElementById('seo-metrics');
    if (seoEl) {
        seoEl.innerHTML = `
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;text-align:center">
                <div><div style="font-size:1.5em;color:#ff4444;font-weight:bold">${seo.performance_score || 0}</div><div style="font-size:0.7em;color:#aaa">Performance</div></div>
                <div><div style="font-size:1.5em;color:#00ff88;font-weight:bold">${seo.seo_score || 0}</div><div style="font-size:0.7em;color:#aaa">SEO</div></div>
                <div><div style="font-size:1.5em;color:#ffd700;font-weight:bold">${seo.accessibility_score || 0}</div><div style="font-size:0.7em;color:#aaa">Accessibility</div></div>
            </div>
            <div style="display:grid;grid-template-columns:repeat(2,1fr);gap:6px;margin-top:12px;font-size:0.8em">
                <div style="color:#aaa">Blog Posts: <span style="color:#fff">${seo.blog_posts || 0}</span></div>
                <div style="color:#aaa">Image Alts: <span style="color:#fff">${(seo.image_alts||0).toLocaleString()}</span></div>
                <div style="color:#aaa">Guides: <span style="color:#fff">${seo.guide_pages || 0}</span></div>
                <div style="color:#aaa">FAQ Schemas: <span style="color:#fff">${seo.faq_schemas || 0}</span></div>
                <div style="color:#aaa">Citations: <span style="color:#fff">${seo.citations || 60}</span></div>
                <div style="color:#aaa">Local Schemas: <span style="color:#fff">${seo.local_business_schemas || 0}</span></div>

    // Business metrics
    const biz = data.business_metrics || {};
    document.getElementById('metric-revenue').textContent = biz.monthly_revenue || '-';
    document.getElementById('metric-stores').textContent = biz.stores || '-';
    document.getElementById('metric-products').textContent = (biz.products||0).toLocaleString();
    document.getElementById('metric-brands').textContent = biz.brands || '-';
    
    // Activity
    const actEl = document.getElementById('activity-log');
    if (actEl) {
        actEl.innerHTML = (data.recent_activity || []).map(a => `
            <div style="padding:6px 0;border-bottom:1px solid #222;font-size:0.8em">
                <span style="color:#00ff88">${a.time || ''}</span> <span style="color:#ddd">${a.activity || ''}</span>
            </div>
        `).join('');
    }
}

// Initial render
fetchStatus();
// Refresh every 60s
setInterval(fetchStatus, 60000);
</script>

</html>
